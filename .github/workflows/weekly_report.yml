name: Weekly Hyros Edge Report

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (only emails you, not the full list)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly report
        env:
          HYROS_API_KEY: ${{ secrets.HYROS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python weekly_report.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reports/
          git diff --staged --quiet || git commit -m "Add weekly report for week of $(date -d 'last monday' '+%Y-%m-%d' 2>/dev/null || date -v-monday '+%Y-%m-%d')"
          git push
